<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>야간 자율학습 신청 시스템</title>

  <!-- React CDNs (Production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      line-height: 1.5;
      font-weight: 400;
      color-scheme: dark;
      color: rgba(255, 255, 255, 0.87);
      background-color: #0c0c0e;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1a1a2e, #0c0c0e);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #root {
      width: 100%;
      max-width: 1000px;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .login-container {
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      max-width: 400px;
      width: 100%;
      padding: 48px;
      text-align: center;
    }

    .logo-section h1 {
      font-size: 2rem;
      margin: 24px 0 12px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-section p {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    #google-btn-container {
      min-height: 40px;
      display: flex;
      justify-content: center;
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      position: relative;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 16px;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .calendar-day.selected {
      background: #4f46e5;
      color: white;
    }

    .calendar-day.not-current {
      opacity: 0.2;
      cursor: default;
    }

    .calendar-day:hover:not(.not-current) {
      background: rgba(255, 255, 255, 0.1);
    }

    .dot {
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      position: absolute;
      bottom: 6px;
    }

    .calendar-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .submit-btn {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }

    .submit-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .history-section {
      padding: 24px;
      margin-top: 24px;
    }

    .date-tag {
      background: rgba(79, 70, 229, 0.1);
      color: #a5b4fc;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin: 4px;
      display: inline-block;
    }

    .success-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translate(-50%, 20px);
        opacity: 0;
      }

      to {
        transform: translate(-50%, 0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    const e = React.createElement;
    const { useState, useEffect } = React;

    const YOUR_CLIENT_ID = "783955617247-32toh8t2khrb9l1qj1sbhl5t4it7au54.apps.googleusercontent.com";
    const YOUR_GAS_URL = "https://script.google.com/macros/s/AKfycbzzEnFbozGd3xiz48ma-4VXZdbiZOdJdn-930IQNmMQVK4F8uXpfKwknAH6uFGC4eB6/exec";

    function App() {
      const [user, setUser] = useState(null);
      const [selectedDates, setSelectedDates] = useState([]);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [isSuccess, setIsSuccess] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleCredentialResponse = (response) => {
        const responsePayload = decodeJwtResponse(response.credential);
        setUser({
          id: responsePayload.family_name,
          name: responsePayload.given_name,
          email: responsePayload.email
        });
      };

      const decodeJwtResponse = (token) => {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      };

      useEffect(() => {
        const fetchHistory = async () => {
          if (!user) return;
          try {
            const resp = await fetch(`${YOUR_GAS_URL}?studentId=${user.id}&name=${user.name}`);
            const data = await resp.json();
            if (data.found && data.dates) {
              setSelectedDates(data.dates);
              console.log('History loaded:', data.dates);
            }
          } catch (e) {
            console.error('History fetch error:', e);
          }
        };
        fetchHistory();
      }, [user]);

      useEffect(() => {
        if (window.google) {
          google.accounts.id.initialize({
            client_id: YOUR_CLIENT_ID,
            callback: handleCredentialResponse
          });
          if (!user) {
            const btnContainer = document.getElementById("google-btn-container");
            if (btnContainer) {
              google.accounts.id.renderButton(btnContainer, { theme: "outline", size: "large", width: "100%" });
            }
          }
        }
        if (window.lucide) window.lucide.createIcons();
      }, [user, currentMonth, selectedDates]);

      const toggleDate = (dateStr) => {
        setSelectedDates(prev => prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr]);
      };

      const handleSubmit = async () => {
        if (selectedDates.length === 0 || isSubmitting) return;

        // 중복 신청 확인 (기존 내역이 있는 경우 사용자 확인)
        const confirmMsg = "이미 신청한 내역이 있을 경우 기존 기록을 지우고 새로 신청합니다. 진행하시겠습니까?";
        if (!confirm(confirmMsg)) return;

        setIsSubmitting(true);
        const payload = {
          studentId: user.id,
          name: user.name,
          appliedAt: new Date().toLocaleString('ko-KR'),
          dates: selectedDates.sort()
        };
        try {
          const response = await fetch(YOUR_GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            mode: 'no-cors' // GAS 특성상 no-cors 사용 권장 (또는 리다이렉트 대응)
          });

          setIsSuccess(true);
          // 신청 성공 후 다시 내역을 불러오거나 상태 유지
          setTimeout(() => setIsSuccess(false), 3000);
        } catch (error) {
          console.error('Submit Error:', error);
          alert('신청 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
        } finally { setIsSubmitting(false); }
      };

      if (!user) {
        return e('div', { className: 'login-container' },
          e('div', { className: 'glass-card login-box' },
            e('div', { className: 'logo-section' },
              e('div', { style: { padding: '20px', background: 'rgba(79,70,229,0.1)', borderRadius: '20px', display: 'inline-flex', color: '#818cf8' } },
                e('i', { 'data-lucide': 'calendar', style: { width: 48, height: 48 } })
              ),
              e('h1', null, '야간 자율학습 신청'),
              e('p', null, '리로스쿨보다 더 간편하게, 구글 계정으로 시작하세요.')
            ),
            e('div', { id: 'google-btn-container' }),
            e('p', { style: { fontSize: '0.8rem', color: '#ef4444', marginTop: '20px' } },
              window.location.protocol === 'file:' ? '⚠️ 로컬 파일(file://)에서는 구글 로그인이 작동하지 않습니다. 반드시 깃허브에 업로드 후 확인해 주세요!' : '')
          )
        );
      }

      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const calendarDays = [];
      for (let i = 0; i < firstDay; i++) calendarDays.push(e('div', { key: `p-${i}`, className: 'calendar-day not-current' }));
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isSelected = selectedDates.includes(dateStr);
        calendarDays.push(e('div', {
          key: dateStr,
          className: `calendar-day ${isSelected ? 'selected' : ''}`,
          onClick: () => toggleDate(dateStr)
        }, d, isSelected && e('div', { className: 'dot' })));
      }

      return e('div', null,
        e('header', { className: 'main-header' },
          e('div', { className: 'glass-card user-profile' },
            e('div', { style: { padding: '6px', background: 'rgba(79,70,229,0.1)', borderRadius: '8px', color: '#818cf8', display: 'flex' } },
              e('i', { 'data-lucide': 'user', style: { width: 18, height: 18 } })
            ),
            e('div', { style: { display: 'flex', flexDirection: 'column', marginLeft: '8px' } },
              e('span', { className: 'student-id' }, user.id),
              e('span', { className: 'student-name' }, user.name)
            ),
            e('button', { className: 'logout-btn', onClick: () => setUser(null) }, e('i', { 'data-lucide': 'log-out', style: { width: 16, height: 16 } }))
          ),
          e('h1', { style: { fontSize: '1.2rem', margin: 0 } }, '학습 신청 현황')
        ),
        e('div', { className: 'glass-card calendar-section', style: { padding: '32px' } },
          e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
            e('h2', { style: { margin: 0 } }, `${year}년 ${month + 1}월`),
            e('div', { style: { display: 'flex', gap: '8px' } },
              e('button', { className: 'logout-btn', onClick: () => setCurrentMonth(new Date(year, month - 1)) }, e('i', { 'data-lucide': 'chevron-left', style: { width: 18, height: 18 } })),
              e('button', { className: 'logout-btn', onClick: () => setCurrentMonth(new Date(year, month + 1)) }, e('i', { 'data-lucide': 'chevron-right', style: { width: 18, height: 18 } }))
            )
          ),
          e('div', { className: 'calendar-grid' },
            ['일', '월', '화', '수', '목', '금', '토'].map(d => e('div', { key: d, style: { textAlign: 'center', color: '#64748b', fontSize: '0.8rem', fontWeight: 600 } }, d)),
            calendarDays
          ),
          e('div', { className: 'calendar-footer' },
            e('span', { style: { color: '#94a3b8' } }, `선택된 날짜: ${selectedDates.length}일`),
            e('button', {
              className: `submit-btn ${selectedDates.length === 0 ? 'disabled' : ''}`,
              onClick: handleSubmit
            }, isSubmitting ? '전송 중...' : '신청하기', e('i', { 'data-lucide': 'send', style: { width: 16, height: 16 } }))
          )
        ),
        e('div', { className: 'glass-card history-section' },
          e('h3', { style: { margin: '0 0 16px' } }, '선택 내역'),
          selectedDates.length > 0 ? selectedDates.sort().map(d => e('span', { key: d, className: 'date-tag' }, d)) : e('p', { style: { color: '#64748b' } }, '날짜를 선택해 주세요.')
        ),
        isSuccess && e('div', { className: 'success-toast' }, e('i', { 'data-lucide': 'check-circle' }), '신청이 완료되었습니다!')
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>

</html>
